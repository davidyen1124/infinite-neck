<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infinite Neck</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='white'/%3E%3Cpath d='M32 12c10 0 16 7 16 15 0 8-6 14-16 14s-16-6-16-14c0-8 6-15 16-15Zm-4 28h8v12h-8Zm-3 12h14v4H25Z' fill='%23171717'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

  <body>
    <main class="experience">
      <section class="stage">
        <div class="copy">
          <p class="copy__eyebrow">Infinite Neck</p>
          <p class="copy__hint">Scroll down and the neck keeps growing.</p>
        </div>

        <div class="character-shell">
          <canvas class="character-canvas" aria-hidden="true"></canvas>
        </div>

        <div class="scroll-pill">
          <span>Scroll</span>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
